# ============================================================================
# CatBoost Model Config Guide
# ============================================================================
# Bu dosya `catboost` alias'i icin varsayilan parametreleri tanimlar.
#
# Desteklenen alanlar (CatBoostWrapper.__init__):
# - iterations: int
#   Boosting iterasyon sayisi. Buyudukce kapasite ve sure artar.
#   Tipik aralik: 100 - 2000
#
# - learning_rate: float
#   Ogrenme orani. Dusuk degerler daha stabil, daha uzun surede ogrenir.
#   Tipik aralik: 0.01 - 0.3
#
# - depth: int
#   Agac derinligi. Buyudukce model kapasitesi ve overfit riski artar.
#   Tipik aralik: 4 - 10
#
# - random_state: int
#   Tekrarlanabilirlik icin seed.
#
# Not:
# - CatBoost paketi yuklu degilse wrapper fallback modele gecer.

iterations: 450
learning_rate: 0.035
depth: 5
l2_leaf_reg: 8.0
random_strength: 2.0
bagging_temperature: 1.5
subsample: 0.75
class_weight:
class_weights:
early_stopping:
  enabled: true
  validation_split: 0.15
  patience: 40
  restore_best_weights: true

tuning_search_space:
  iterations:
    type: int
    low: 250
    high: 1000
    step: 50
  learning_rate:
    type: float
    low: 0.01
    high: 0.08
    log: true
  depth:
    type: int
    low: 4
    high: 8
    step: 1
  l2_leaf_reg:
    type: float
    low: 1.0
    high: 40.0
    log: true
  random_strength:
    type: float
    low: 0.0
    high: 4.0
    step: 0.25
  bagging_temperature:
    type: float
    low: 0.0
    high: 3.0
    step: 0.25
  subsample:
    type: float
    low: 0.6
    high: 0.95
    step: 0.05
