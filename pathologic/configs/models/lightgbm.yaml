# ============================================================================
# LightGBM Model Config Guide
# ============================================================================
# This file defines the default parameters for the `lightgbm` alias.
#
# Supported Parameters (LightGBMWrapper.__init__):
# - n_estimators: int
#   The number of boosting iterations (trees).
#   Range: 100 - 1500
#
# - num_leaves: int
#   Maximum number of leaves in one tree.
#   Range: 20 - 150
#
# - learning_rate: float
#   Step size for shrinkage.
#   Range: 0.01 - 0.3
#
# - max_depth: int
#   Maximum depth of the tree. -1 for no limit.
#   Range: 3 - 12
#
# - min_child_samples: int
#   The minimum number of data in one leaf.
#   Range: 10 - 50
#
# - random_state: int
#   Seed for reproducibility.

n_estimators: 450
num_leaves: 24
learning_rate: 0.035
max_depth: 6
min_child_samples: 40
subsample: 0.75
colsample_bytree: 0.7
reg_alpha: 0.01
reg_lambda: 3.0
scale_pos_weight: 2.0
class_weight:
importance_type: "split"

early_stopping:
  enabled: true
  validation_split: 0.15
  patience: 40

tuning_search_space:
  n_estimators:
    type: int
    low: 250
    high: 1000
    step: 50
  num_leaves:
    type: int
    low: 16
    high: 64
    step: 4
  learning_rate:
    type: float
    low: 0.01
    high: 0.08
    log: true
  max_depth:
    type: int
    low: 3
    high: 10
    step: 1
  min_child_samples:
    type: int
    low: 20
    high: 120
    step: 10
  subsample:
    type: float
    low: 0.6
    high: 0.95
    step: 0.05
  colsample_bytree:
    type: float
    low: 0.5
    high: 0.9
    step: 0.05
  reg_alpha:
    type: float
    low: 0.0001
    high: 5.0
    log: true
  reg_lambda:
    type: float
    low: 0.5
    high: 25.0
    log: true
  scale_pos_weight:
    type: float
    low: 1.0
    high: 12.0
    log: true
