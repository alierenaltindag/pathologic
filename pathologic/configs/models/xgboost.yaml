# ============================================================================
# XGBoost Model Config Guide
# ============================================================================
# Bu dosya `xgboost` alias'i icin varsayilan parametreleri tanimlar.
#
# Desteklenen alanlar (XGBoostWrapper.__init__):
# - n_estimators: int
#   Agac sayisi. Daha yuksek degerler genelde daha guclu ogrenme ama daha uzun
#   egitim suresi getirir.
#   Tipik aralik: 50 - 1000
#
# - max_depth: int
#   Agac derinligi. Buyudukce model karmasikligi ve overfit riski artar.
#   Tipik aralik: 2 - 10
#
# - learning_rate: float
#   Boosting adim buyuklugu. Dusuk deger + daha cok agac genelde daha stabil.
#   Tipik aralik: 0.01 - 0.3
#
# - random_state: int
#   Tekrarlanabilirlik icin seed.
#
# Tuning notu:
# - `tuning_search_space` alanini eklerseniz `PathoLogic.tune(...)` bunu kullanir.
# - Her parametre icin tip: int | float | categorical olabilir.

n_estimators: 300
max_depth: 5
learning_rate: 0.05
min_child_weight: 3.0
subsample: 0.8
colsample_bytree: 0.8
gamma: 0.5
reg_alpha: 0.0001
reg_lambda: 1.0
scale_pos_weight: 1.0
class_weight:
early_stopping:
  enabled: true
  validation_split: 0.2
  patience: 20

tuning_search_space:
  n_estimators:
    type: int
    low: 150
    high: 650
    step: 50
  max_depth:
    type: int
    low: 3
    high: 8
    step: 1
  learning_rate:
    type: float
    low: 0.01
    high: 0.12
    log: true
  min_child_weight:
    type: float
    low: 1.0
    high: 10.0
    step: 1.0
  subsample:
    type: float
    low: 0.6
    high: 1.0
    step: 0.1
  colsample_bytree:
    type: float
    low: 0.6
    high: 1.0
    step: 0.1
  gamma:
    type: float
    low: 0.0
    high: 3.0
    step: 0.25
  reg_alpha:
    type: float
    low: 0.00001
    high: 1.0
    log: true
  reg_lambda:
    type: float
    low: 0.1
    high: 10.0
    log: true
  scale_pos_weight:
    type: float
    low: 0.5
    high: 10.0
    log: true
