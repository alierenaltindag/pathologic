# ============================================================================
# XGBoost Model Config Guide
# ============================================================================
# Bu dosya `xgboost` alias'i icin varsayilan parametreleri tanimlar.
#
# Desteklenen alanlar (XGBoostWrapper.__init__):
# - n_estimators: int
#   Agac sayisi. Daha yuksek degerler genelde daha guclu ogrenme ama daha uzun
#   egitim suresi getirir.
#   Tipik aralik: 50 - 1000
#
# - max_depth: int
#   Agac derinligi. Buyudukce model karmasikligi ve overfit riski artar.
#   Tipik aralik: 2 - 10
#
# - learning_rate: float
#   Boosting adim buyuklugu. Dusuk deger + daha cok agac genelde daha stabil.
#   Tipik aralik: 0.01 - 0.3
#
# - random_state: int
#   Tekrarlanabilirlik icin seed.
#
# Tuning notu:
# - `tuning_search_space` alanini eklerseniz `PathoLogic.tune(...)` bunu kullanir.
# - Her parametre icin tip: int | float | categorical olabilir.

n_estimators: 450
max_depth: 4
learning_rate: 0.035
min_child_weight: 5.0
subsample: 0.75
colsample_bytree: 0.7
gamma: 1.0
reg_alpha: 0.01
reg_lambda: 3.0
scale_pos_weight: 2.0
class_weight:
early_stopping:
  enabled: true
  validation_split: 0.15
  patience: 30

tuning_search_space:
  n_estimators:
    type: int
    low: 250
    high: 1000
    step: 50
  max_depth:
    type: int
    low: 3
    high: 7
    step: 1
  learning_rate:
    type: float
    low: 0.01
    high: 0.08
    log: true
  min_child_weight:
    type: float
    low: 2.0
    high: 12.0
    step: 1.0
  subsample:
    type: float
    low: 0.6
    high: 0.95
    step: 0.05
  colsample_bytree:
    type: float
    low: 0.5
    high: 0.9
    step: 0.05
  gamma:
    type: float
    low: 0.0
    high: 5.0
    step: 0.25
  reg_alpha:
    type: float
    low: 0.0001
    high: 5.0
    log: true
  reg_lambda:
    type: float
    low: 0.5
    high: 25.0
    log: true
  scale_pos_weight:
    type: float
    low: 1.0
    high: 12.0
    log: true
