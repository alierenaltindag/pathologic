# Hyperparameter optimization (HPO) ayarları.
# Bu dosya defaults.yaml içinden tune alt bloğu olarak yüklenir.

# HPO motoru. [grid/random/optuna]
engine: random
seed: 42
device: auto

# Toplam deneme sayısı.
n_trials: 20

# Budget kontrolu icin ust deneme limiti.
max_trials: 20

# Optimizasyon hedef metriği.
objective: f1

# Zaman limiti (dakika).
timeout_minutes: 60

# Tuning erken durdurma kontrolu.
early_stopping:
  enabled: false
  patience: 5
  min_improvement: 0.0

class_imbalance:
  enabled: true
  # [balanced/scale_pos_weight]
  # scale_pos_weight: xgboost/lightgbm icin negatif/pozitif oranini uygular.
  mode: scale_pos_weight
  # Bu veri setindeki dengesizlik icin (67.5/32.5) yaklasik oran.
  positive_class_weight: 2.08

# Opsiyonel tune-time preprocess override bloklari.
# Bos birakildiginda train.preprocess varsayimlari kullanilir.
preprocess:
  missing_value_policy: impute
  impute_strategy: median
  add_missing_indicators: false
  tabnet_missingness_mode: auto
  tabnet_missing_indicator_features:
    - feature__GERP_Score
    - GERP_Score
  tabnet_impute_strategy: median
